<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>onlyhers.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
  <script src="config/config.js"></script>
  <style>
    /* ══════════════════════════════════════════
       ROOT & CSS VARIABLES
    ══════════════════════════════════════════ */
    :root {
      --bg: #0a0a0f;
      --bg-card: #111118;
      --bg-glass: rgba(17,17,24,0.75);
      --accent: #c084fc;
      --accent-pink: #f472b6;
      --accent-soft: #e879f9;
      --text: #f0eaf8;
      --text-muted: #8b7aa8;
      --border: rgba(192,132,252,0.15);
      --glow: rgba(192,132,252,0.25);
      --glow-pink: rgba(244,114,182,0.2);
      --radius: 20px;
      --nav-h: 64px;
      --transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: default;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* Ambient glow blobs */
    .ambient {
      position: fixed; pointer-events: none; z-index: 0;
      border-radius: 50%; filter: blur(80px); opacity: 0.12;
    }
    .ambient-1 { width: 400px; height: 400px; background: var(--accent); top: -100px; right: -100px; }
    .ambient-2 { width: 300px; height: 300px; background: var(--accent-pink); bottom: 20%; left: -80px; }
    .ambient-3 { width: 200px; height: 200px; background: #818cf8; bottom: -50px; right: 30%; opacity: 0.08; }

    /* ══════════════════════════════════════════
       SPLASH SCREEN
    ══════════════════════════════════════════ */
    #splash {
      position: fixed; inset: 0; z-index: 10000;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 24px;
      transition: opacity 0.8s ease, visibility 0.8s ease;
    }
    #splash.hide { opacity: 0; visibility: hidden; }

    .splash-logo {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 8vw, 4rem);
      font-style: italic;
      background: linear-gradient(135deg, var(--text) 0%, var(--accent) 50%, var(--accent-pink) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: pulse-glow 2s ease-in-out infinite;
    }
    .splash-sub {
      font-size: 0.85rem; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--text-muted); font-weight: 300;
      animation: fadeIn 1s ease 0.5s both;
    }
    .splash-loader {
      width: 120px; height: 2px;
      background: var(--border);
      border-radius: 2px; overflow: hidden;
      margin-top: 8px;
    }
    .splash-loader-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-pink));
      border-radius: 2px;
      animation: load-bar 2s ease forwards;
    }
    .splash-loading-text {
      font-size: 0.75rem; color: var(--text-muted);
      letter-spacing: 0.15em;
      animation: fadeIn 0.5s ease;
    }

    @keyframes load-bar { from { width: 0 } to { width: 100% } }
    @keyframes pulse-glow {
      0%, 100% { filter: drop-shadow(0 0 20px rgba(192,132,252,0.3)); }
      50% { filter: drop-shadow(0 0 40px rgba(192,132,252,0.6)); }
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

    /* ══════════════════════════════════════════
       NAVBAR
    ══════════════════════════════════════════ */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      height: var(--nav-h); z-index: 1000;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px;
      background: rgba(10,10,15,0.6);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      transition: var(--transition);
    }
    .nav-logo {
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.4rem;
      background: linear-gradient(135deg, var(--text), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .nav-icons { display: flex; gap: 8px; align-items: center; }
    .nav-btn {
      width: 40px; height: 40px; border-radius: 12px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: var(--transition);
      position: relative;
    }
    .nav-btn:hover { background: var(--border); color: var(--text); }
    .nav-btn.active { background: rgba(192,132,252,0.15); color: var(--accent); border-color: rgba(192,132,252,0.3); }
    .notif-dot {
      position: absolute; top: 6px; right: 6px;
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent-pink); border: 1px solid var(--bg);
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000;
      height: 68px;
      background: rgba(10,10,15,0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      padding: 0 8px 8px;
    }
    .bnav-btn {
      flex: 1; height: 48px; border-radius: 14px;
      background: transparent; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 1.2rem;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; transition: var(--transition);
    }
    .bnav-btn span { font-size: 0.6rem; letter-spacing: 0.05em; font-weight: 500; }
    .bnav-btn.active { color: var(--accent); }
    .bnav-btn.active .bnav-pip { background: var(--accent); }
    .bnav-pip { width: 4px; height: 4px; border-radius: 50%; background: transparent; margin-top: 2px; transition: var(--transition); }

    /* ══════════════════════════════════════════
       MAIN LAYOUT
    ══════════════════════════════════════════ */
    main {
      padding-top: var(--nav-h);
      padding-bottom: 80px;
      position: relative; z-index: 1;
    }

    .page { display: none; animation: slideUp 0.4s ease; }
    .page.active { display: block; }

    .container { max-width: 480px; margin: 0 auto; padding: 0 16px; }

    /* ══════════════════════════════════════════
       STORIES
    ══════════════════════════════════════════ */
    .stories-wrap {
      padding: 16px 0 8px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stories-wrap::-webkit-scrollbar { display: none; }
    .stories-row {
      display: flex; gap: 12px;
      padding: 0 16px;
      width: max-content;
    }
    .story-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 6px;
      cursor: pointer;
    }
    .story-ring {
      width: 64px; height: 64px; border-radius: 50%;
      padding: 2.5px;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink), #818cf8);
    }
    .story-ring.seen {
      background: none;
      border: 2px solid var(--border);
    }
    .story-img {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover;
      border: 2px solid var(--bg);
      background: var(--bg-card);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .story-label {
      font-size: 0.65rem; color: var(--text-muted);
      max-width: 64px; text-align: center;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      font-weight: 400;
    }

    /* ══════════════════════════════════════════
       QUOTE TICKER
    ══════════════════════════════════════════ */
    .quote-bar {
      margin: 4px 16px 12px;
      padding: 12px 18px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      border-radius: 14px;
      backdrop-filter: blur(12px);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
      min-height: 44px;
      display: flex; align-items: center; justify-content: center;
    }

    /* ══════════════════════════════════════════
       POSTS / FEED
    ══════════════════════════════════════════ */
    .feed { display: flex; flex-direction: column; gap: 20px; padding: 0 16px 16px; }

    .post-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      animation: slideUp 0.5s ease both;
      transition: var(--transition);
    }
    .post-card:hover { border-color: rgba(192,132,252,0.3); }

    .pinned-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 16px 0;
      font-size: 0.7rem; color: var(--accent);
      letter-spacing: 0.1em; text-transform: uppercase; font-weight: 500;
    }

    .post-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px 10px;
    }
    .post-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover; background: var(--bg);
      border: 1.5px solid var(--border);
    }
    .post-meta { flex: 1; }
    .post-username { font-size: 0.85rem; font-weight: 500; color: var(--text); }
    .post-date { font-size: 0.7rem; color: var(--text-muted); }
    .post-more {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 4px; font-size: 1rem;
    }

    /* Photo carousel */
    .post-photos { position: relative; overflow: hidden; }
    .photos-track {
      display: flex;
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .post-photo {
      min-width: 100%; aspect-ratio: 1;
      object-fit: cover; background: var(--bg);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); font-size: 3rem;
    }
    .post-photo.placeholder { background: linear-gradient(135deg, #1a1a2e, #16213e); }

    .photo-dots {
      display: flex; gap: 5px;
      position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    }
    .photo-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(255,255,255,0.4); transition: var(--transition);
    }
    .photo-dot.active { background: white; width: 16px; border-radius: 3px; }

    /* Like animation overlay */
    .like-overlay {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .heart-burst {
      font-size: 5rem;
      animation: heart-pop 0.8s ease forwards;
      opacity: 0;
    }
    @keyframes heart-pop {
      0% { opacity: 0; transform: scale(0.5); }
      30% { opacity: 1; transform: scale(1.3); }
      60% { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(1.1); }
    }

    /* Post actions */
    .post-actions {
      display: flex; align-items: center; gap: 4px;
      padding: 10px 14px 4px;
    }
    .action-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; padding: 6px 8px; border-radius: 10px;
      font-size: 1.1rem; display: flex; align-items: center; gap: 5px;
      transition: var(--transition);
    }
    .action-btn:hover { background: var(--border); color: var(--text); }
    .action-btn.liked { color: #f43f5e; }
    .action-btn span { font-size: 0.8rem; font-family: 'DM Sans', sans-serif; font-weight: 500; }
    .action-spacer { flex: 1; }

    .like-count {
      padding: 2px 16px 6px;
      font-size: 0.8rem; font-weight: 500; color: var(--text);
    }
    .post-caption {
      padding: 2px 16px 12px;
      font-size: 0.875rem; line-height: 1.5; color: var(--text);
    }
    .post-caption .tag { color: var(--accent); }

    /* Comments preview */
    .comments-preview {
      padding: 0 16px 14px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }
    .comment-item {
      display: flex; gap: 8px; align-items: flex-start;
      margin-bottom: 8px;
    }
    .comment-avatar {
      width: 26px; height: 26px; border-radius: 50%;
      object-fit: cover; background: var(--bg); flex-shrink: 0;
    }
    .comment-body { font-size: 0.78rem; line-height: 1.4; }
    .comment-author { font-weight: 500; color: var(--accent); margin-right: 4px; }
    .comment-text { color: var(--text-muted); }
    .comment-time { font-size: 0.65rem; color: var(--text-muted); margin-top: 2px; }

    .comment-input-row {
      display: flex; gap: 8px; align-items: center; margin-top: 10px;
    }
    .comment-input {
      flex: 1; background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      border-radius: 20px; padding: 8px 14px;
      color: var(--text); font-family: 'DM Sans', sans-serif;
      font-size: 0.8rem; outline: none; transition: var(--transition);
    }
    .comment-input:focus { border-color: rgba(192,132,252,0.4); background: rgba(192,132,252,0.05); }
    .comment-input::placeholder { color: var(--text-muted); }
    .comment-send {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      border: none; color: white; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; transition: var(--transition);
    }
    .comment-send:hover { transform: scale(1.1); }

    /* ══════════════════════════════════════════
       MUSIC PLAYER
    ══════════════════════════════════════════ */
    .music-bar {
      position: fixed; bottom: 68px; left: 0; right: 0; z-index: 900;
      padding: 0 16px 8px;
      transform: translateY(100px);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .music-bar.visible { transform: translateY(0); }
    .music-card {
      background: rgba(17,17,24,0.9);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 0 1px var(--border);
    }
    .music-cover {
      width: 44px; height: 44px; border-radius: 10px;
      object-fit: cover; background: linear-gradient(135deg, #1e1e2e, #2d1e3e);
      flex-shrink: 0; display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
      animation: spin-slow 8s linear infinite paused;
    }
    .music-cover.playing { animation-play-state: running; }
    @keyframes spin-slow { to { transform: rotate(360deg); } }
    .music-info { flex: 1; min-width: 0; }
    .music-title { font-size: 0.82rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .music-artist { font-size: 0.7rem; color: var(--text-muted); }
    .music-progress {
      height: 2px; background: var(--border); border-radius: 2px; margin-top: 4px;
      overflow: hidden;
    }
    .music-progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-pink));
      border-radius: 2px;
      transition: width 1s linear;
    }
    .music-controls { display: flex; align-items: center; gap: 6px; }
    .mc-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; transition: var(--transition);
    }
    .mc-btn:hover { color: var(--text); background: var(--border); }
    .mc-play {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      color: white; border-radius: 50%; font-size: 0.9rem;
    }
    .mc-play:hover { transform: scale(1.1); background: linear-gradient(135deg, var(--accent-soft), var(--accent-pink)); }

    /* Full music page */
    .music-page-card {
      margin: 20px 0; padding: 28px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 24px;
    }
    .music-big-cover {
      width: 200px; height: 200px; border-radius: 20px;
      margin: 0 auto 20px;
      object-fit: cover;
      background: linear-gradient(135deg, #1e1e2e, #2d1e3e);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem;
      box-shadow: 0 20px 60px rgba(192,132,252,0.3);
      animation: spin-slow 12s linear infinite paused;
    }
    .music-big-cover.playing { animation-play-state: running; }
    .music-big-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; text-align: center; }
    .music-big-artist { color: var(--text-muted); text-align: center; margin: 4px 0 20px; }
    .music-seek {
      width: 100%; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 0 6px; cursor: pointer;
      -webkit-appearance: none;
    }
    .music-seek::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer;
    }
    .music-time { display: flex; justify-content: space-between; font-size: 0.7rem; color: var(--text-muted); margin-bottom: 20px; }
    .music-main-controls { display: flex; align-items: center; justify-content: center; gap: 12px; }
    .mmc-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; transition: var(--transition);
    }
    .mmc-btn:hover { color: var(--text); background: var(--border); }
    .mmc-play {
      width: 60px; height: 60px; font-size: 1.4rem;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      color: white;
    }
    .mmc-play:hover { transform: scale(1.08); }
    .playlist-list { margin-top: 24px; display: flex; flex-direction: column; gap: 4px; }
    .playlist-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 14px;
      cursor: pointer; transition: var(--transition);
    }
    .playlist-item:hover, .playlist-item.active {
      background: rgba(192,132,252,0.1);
    }
    .playlist-item.active .pl-title { color: var(--accent); }
    .pl-num { width: 20px; text-align: center; font-size: 0.75rem; color: var(--text-muted); }
    .pl-cover {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--bg); object-fit: cover;
      display: flex; align-items: center; justify-content: center; font-size: 1rem;
    }
    .pl-info { flex: 1; }
    .pl-title { font-size: 0.85rem; font-weight: 500; }
    .pl-artist { font-size: 0.72rem; color: var(--text-muted); }
    .pl-dur { font-size: 0.72rem; color: var(--text-muted); }

    /* ══════════════════════════════════════════
       PROFILE PAGE
    ══════════════════════════════════════════ */
    .profile-cover {
      width: 100%; aspect-ratio: 3/1; object-fit: cover;
      background: linear-gradient(135deg, #0f0f1a, #1a1a2e);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; position: relative;
    }
    .profile-cover-img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
    .profile-cover-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, transparent 40%, var(--bg) 100%);
    }
    .profile-info {
      padding: 0 20px 20px;
      margin-top: -50px; position: relative;
    }
    .profile-avatar-wrap {
      width: 90px; height: 90px;
      border-radius: 50%; padding: 3px;
      background: linear-gradient(135deg, var(--accent), var(--accent-pink));
      margin-bottom: 12px;
    }
    .profile-avatar {
      width: 100%; height: 100%; border-radius: 50%;
      object-fit: cover; background: var(--bg-card);
      border: 3px solid var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
    }
    .profile-name-row { display: flex; align-items: center; gap: 6px; margin-bottom: 2px; }
    .profile-name { font-family: 'Playfair Display', serif; font-size: 1.4rem; }
    .verified-badge { color: var(--accent); font-size: 1rem; }
    .profile-handle { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px; }
    .profile-bio { font-size: 0.875rem; line-height: 1.5; color: var(--text); margin-bottom: 12px; }
    .profile-meta { display: flex; gap: 16px; margin-bottom: 16px; }
    .profile-meta-item { display: flex; align-items: center; gap: 5px; font-size: 0.78rem; color: var(--text-muted); }
    .profile-stats { display: flex; gap: 0; margin-bottom: 20px; }
    .stat-item {
      flex: 1; text-align: center; padding: 12px 0;
      border: 1px solid var(--border); background: var(--bg-card); border-radius: 0;
    }
    .stat-item:first-child { border-radius: 12px 0 0 12px; }
    .stat-item:last-child { border-radius: 0 12px 12px 0; border-left: none; }
    .stat-item:not(:first-child):not(:last-child) { border-left: none; }
    .stat-num { font-size: 1.2rem; font-weight: 600; color: var(--text); }
    .stat-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }

    /* Profile grid */
    .profile-grid {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 2px; margin: 0 -16px;
    }
    .grid-item {
      aspect-ratio: 1; background: var(--bg-card);
      overflow: hidden; cursor: pointer; position: relative;
    }
    .grid-item img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; }
    .grid-item:hover img { transform: scale(1.05); }
    .grid-placeholder {
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #111118, #1a1a2e);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; color: var(--border);
    }
    .grid-multi-badge {
      position: absolute; top: 6px; right: 6px;
      background: rgba(0,0,0,0.7); color: white;
      border-radius: 6px; padding: 2px 5px; font-size: 0.6rem;
    }

    /* ══════════════════════════════════════════
       NOTIFICATIONS
    ══════════════════════════════════════════ */
    .notif-header {
      padding: 20px 0 12px;
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
    }
    .notif-list { display: flex; flex-direction: column; gap: 2px; }
    .notif-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; border-radius: 14px;
      background: var(--bg-card); border: 1px solid var(--border);
      transition: var(--transition); cursor: pointer;
    }
    .notif-item:hover { background: rgba(192,132,252,0.05); border-color: rgba(192,132,252,0.25); }
    .notif-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      object-fit: cover; background: var(--bg);
      border: 1.5px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
    }
    .notif-content { flex: 1; }
    .notif-text { font-size: 0.82rem; line-height: 1.4; color: var(--text); }
    .notif-time { font-size: 0.68rem; color: var(--text-muted); margin-top: 2px; }
    .notif-icon { font-size: 1rem; width: 28px; text-align: center; }

    /* ══════════════════════════════════════════
       STORY VIEWER MODAL
    ══════════════════════════════════════════ */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 5000;
      background: rgba(0,0,0,0.95);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; visibility: hidden;
      transition: all 0.3s ease;
    }
    .modal-overlay.open { opacity: 1; visibility: visible; }

    .story-viewer {
      width: min(100vw, 400px); height: 100vh;
      position: relative; overflow: hidden;
      background: #0a0a0f;
    }
    .story-bg {
      position: absolute; inset: 0;
      background: linear-gradient(135deg, #1a1a2e, #0f0f1a);
      display: flex; align-items: center; justify-content: center;
      font-size: 6rem;
    }
    .story-bg img { width: 100%; height: 100%; object-fit: cover; }
    .story-overlay-grad {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.4) 0%, transparent 30%, transparent 70%, rgba(0,0,0,0.7) 100%);
    }
    .story-progress-bars {
      position: absolute; top: 16px; left: 12px; right: 12px;
      display: flex; gap: 4px;
    }
    .story-prog-bar { flex: 1; height: 2px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
    .story-prog-fill { height: 100%; background: white; width: 0; transition: width linear; }
    .story-prog-fill.done { width: 100%; }
    .story-close {
      position: absolute; top: 40px; right: 16px;
      background: rgba(0,0,0,0.5); border: none; color: white;
      width: 36px; height: 36px; border-radius: 50%;
      font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .story-user-info {
      position: absolute; top: 50px; left: 16px;
      display: flex; align-items: center; gap: 10px;
    }
    .story-user-av {
      width: 36px; height: 36px; border-radius: 50%;
      border: 2px solid white; background: var(--bg-card);
      object-fit: cover;
    }
    .story-user-name { font-size: 0.9rem; font-weight: 500; color: white; text-shadow: 0 1px 4px rgba(0,0,0,0.5); }
    .story-user-time { font-size: 0.7rem; color: rgba(255,255,255,0.7); }
    .story-label-text {
      position: absolute; bottom: 50px; left: 0; right: 0;
      text-align: center; padding: 0 24px;
      font-family: 'Playfair Display', serif;
      font-style: italic; font-size: 1.8rem;
      color: white; text-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }

    /* Image viewer modal */
    .img-viewer {
      width: 100vw; max-width: 100vw;
      display: flex; flex-direction: column; align-items: center;
    }
    .img-viewer img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 12px; }
    .img-viewer-close {
      position: absolute; top: 20px; right: 20px;
      background: rgba(0,0,0,0.6); border: none; color: white;
      width: 40px; height: 40px; border-radius: 50%;
      font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    /* ══════════════════════════════════════════
       SCROLLBAR
    ══════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ══════════════════════════════════════════
       SECTION LABELS
    ══════════════════════════════════════════ */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px 8px;
      font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted); font-weight: 500;
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    /* Loading skeleton */
    .skeleton {
      background: linear-gradient(90deg, var(--bg-card) 25%, rgba(255,255,255,0.03) 50%, var(--bg-card) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* Toast */
    .toast {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 10px 20px;
      font-size: 0.82rem; color: var(--text);
      opacity: 0; transition: all 0.3s ease; white-space: nowrap; z-index: 9000;
      backdrop-filter: blur(12px);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════════
       EMPTY STATES
    ══════════════════════════════════════════ */
    .empty-state {
      text-align: center; padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .es-icon { font-size: 3rem; margin-bottom: 12px; opacity: 0.5; }
    .empty-state p { font-size: 0.85rem; }

    /* ══════════════════════════════════════════
       RESPONSIVE
    ══════════════════════════════════════════ */
    @media (max-width: 380px) {
      .stories-row { gap: 8px; padding: 0 12px; }
      .story-ring { width: 56px; height: 56px; }
    }
  </style>
</head>

<script>
// ══════════════════════════════════════════════════════════════
//  MAIN APP — reads from CONFIG
// ══════════════════════════════════════════════════════════════

// Apply theme from config
function applyTheme() {
  const t = CONFIG.theme;
  const r = document.documentElement.style;
  if (t.bg)          r.setProperty('--bg', t.bg);
  if (t.bgCard)      r.setProperty('--bg-card', t.bgCard);
  if (t.bgGlass)     r.setProperty('--bg-glass', t.bgGlass);
  if (t.accent)      r.setProperty('--accent', t.accent);
  if (t.accentPink)  r.setProperty('--accent-pink', t.accentPink);
  if (t.accentSoft)  r.setProperty('--accent-soft', t.accentSoft);
  if (t.text)        r.setProperty('--text', t.text);
  if (t.textMuted)   r.setProperty('--text-muted', t.textMuted);
  if (t.border)      r.setProperty('--border', t.border);
  if (t.glow)        r.setProperty('--glow', t.glow);
}

// ── Splash ──────────────────────────────────────────────────
function initSplash() {
  document.getElementById('splashName').textContent = CONFIG.websiteName;
  document.getElementById('splashText').textContent = CONFIG.splashText;
  const texts = CONFIG.loadingTexts;
  let i = 0;
  const el = document.getElementById('splashLoadingText');
  el.textContent = texts[0];
  const iv = setInterval(() => {
    i = (i+1) % texts.length;
    el.style.opacity = 0;
    setTimeout(() => { el.textContent = texts[i]; el.style.opacity = 1; el.style.transition = 'opacity 0.4s'; }, 200);
  }, 600);
  setTimeout(() => {
    clearInterval(iv);
    document.getElementById('splash').classList.add('hide');
  }, 2200);
}

// ── Navbar ───────────────────────────────────────────────────
function initNavbar() {
  document.getElementById('navbarTitle').textContent = CONFIG.navbarTitle;
  document.title = CONFIG.websiteName;
}

// ── Navigation ───────────────────────────────────────────────
let currentPage = 'home';
function navigate(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.bnav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  const btn = document.getElementById('bnav-' + page);
  if (btn) btn.classList.add('active');
  currentPage = page;
  if (page !== 'home') hideMusicBar();
  else if (isPlaying) showMusicBar();
}

// ── Stories ──────────────────────────────────────────────────
function initStories() {
  const row = document.getElementById('storiesRow');
  CONFIG.stories.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'story-item';
    div.innerHTML = `
      <div class="story-ring" style="background: linear-gradient(135deg, ${s.color}, ${adjustHue(s.color, 40)})">
        <div class="story-img">${s.photo ? `<img src="${s.photo}" alt="${s.label}" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.style.display='none'">` : '🌸'}</div>
      </div>
      <div class="story-label">${s.label}</div>`;
    div.addEventListener('click', () => openStory(i));
    row.appendChild(div);
  });
}

function adjustHue(hex, deg) {
  // simple hue shift approximation
  return hex; // keeps it simple, color is set per story
}

let storyIdx = 0, storyTimer = null;
function openStory(idx) {
  storyIdx = idx;
  const modal = document.getElementById('storyModal');
  modal.classList.add('open');
  renderStory();
}
function renderStory() {
  const s = CONFIG.stories[storyIdx];
  const bg = document.getElementById('storyBg');
  bg.innerHTML = s.photo ? `<img src="${s.photo}" alt="${s.label}" onerror="this.parentElement.innerHTML='🌸'">` : '🌸';
  bg.style.background = `linear-gradient(135deg, ${s.color}22, #0a0a0f)`;
  document.getElementById('storyLabelText').textContent = s.label;
  document.getElementById('storyUserName').textContent = CONFIG.displayName;
  document.getElementById('storyUserAv').src = CONFIG.profilePhoto;

  // Progress bars
  const bars = document.getElementById('storyProgressBars');
  bars.innerHTML = '';
  CONFIG.stories.forEach((_, i) => {
    const b = document.createElement('div'); b.className = 'story-prog-bar';
    const f = document.createElement('div'); f.className = 'story-prog-fill';
    if (i < storyIdx) f.classList.add('done');
    b.appendChild(f); bars.appendChild(b);
  });

  // Auto-advance
  clearTimeout(storyTimer);
  const fill = bars.children[storyIdx]?.querySelector('.story-prog-fill');
  if (fill) {
    fill.style.transition = 'width 4s linear';
    setTimeout(() => fill.style.width = '100%', 30);
  }
  storyTimer = setTimeout(() => {
    storyIdx++;
    if (storyIdx < CONFIG.stories.length) renderStory();
    else closeModal('storyModal');
  }, 4000);
}
function closeStory(e) {
  if (e.target.id === 'storyModal') { clearTimeout(storyTimer); closeModal('storyModal'); }
}

// ── Quote Rotator ─────────────────────────────────────────────
function initQuotes() {
  const bar = document.getElementById('quoteBar');
  let qi = 0;
  function show() {
    bar.style.opacity = 0;
    setTimeout(() => {
      bar.textContent = CONFIG.quotes[qi];
      bar.style.opacity = 1; bar.style.transition = 'opacity 0.6s';
      qi = (qi + 1) % CONFIG.quotes.length;
    }, 400);
  }
  show();
  setInterval(show, 5000);
}

// ── Feed / Posts ──────────────────────────────────────────────
const likeCounts = {};
const likedPosts = new Set();
const comments = {};

function initFeed() {
  const feed = document.getElementById('feedContainer');
  feed.innerHTML = '';

  // Pinned post first
  if (CONFIG.pinnedPost) {
    const pinned = {
      id: 'pinned',
      image: CONFIG.pinnedPost.image,
      caption: CONFIG.pinnedPost.caption,
      date: CONFIG.pinnedPost.date,
      likes: CONFIG.pinnedPost.likes,
      pinned: true
    };
    feed.appendChild(buildPostCard(pinned));
  }

  CONFIG.posts.forEach((post, i) => {
    const card = buildPostCard(post, i);
    card.style.animationDelay = `${i * 0.08}s`;
    feed.appendChild(card);
  });
}

function buildPostCard(post, idx) {
  const id = post.id || 'post_' + idx;
  likeCounts[id] = post.likes || 0;
  comments[id] = [];

  const card = document.createElement('div');
  card.className = 'post-card';
  card.id = 'card_' + id;

  // Pinned badge
  let pinnedHTML = '';
  if (post.pinned) pinnedHTML = `<div class="pinned-badge">📌 pinned post</div>`;

  // Images
  const imgs = post.images || (post.image ? [post.image] : []);
  let photosHTML = '';
  if (imgs.length > 0) {
    const dots = imgs.length > 1 ? `<div class="photo-dots">${imgs.map((_,i) => `<div class="photo-dot ${i===0?'active':''}"></div>`).join('')}</div>` : '';
    photosHTML = `
      <div class="post-photos" id="photos_${id}">
        <div class="photos-track" id="track_${id}">
          ${imgs.map(src => `
            <div class="post-photo" ondblclick="doubleTapLike('${id}', this)">
              <img src="${src}" alt="" style="width:100%;height:100%;object-fit:cover" 
                   onerror="this.style.display='none'"
                   onclick="openImage('${src}')">
              <div class="like-overlay"><div class="heart-burst" id="hb_${id}">❤️</div></div>
            </div>`).join('')}
        </div>
        ${dots}
      </div>`;
  }

  // Caption with tags
  let cap = post.caption || '';
  if (post.tags) cap += ' ' + post.tags.map(t => `<span class="tag">${t}</span>`).join(' ');

  // Comments seed
  const preComments = [
    { author: CONFIG.username, text: '🌙', time: '1h' }
  ];

  card.innerHTML = `
    ${pinnedHTML}
    <div class="post-header">
      <img class="post-avatar" src="${CONFIG.profilePhoto}" alt="" onerror="this.style.display='none'">
      <div class="post-meta">
        <div class="post-username">${CONFIG.username}</div>
        <div class="post-date">${post.date || ''}</div>
      </div>
      <button class="post-more">···</button>
    </div>
    ${photosHTML}
    <div class="post-actions">
      <button class="action-btn ${likedPosts.has(id) ? 'liked' : ''}" onclick="toggleLike('${id}')" id="likeBtn_${id}">
        ${likedPosts.has(id) ? '❤️' : '🤍'} <span id="likeNum_${id}">${likeCounts[id]}</span>
      </button>
      <button class="action-btn" onclick="focusComment('${id}')">💬 <span>${preComments.length}</span></button>
      <div class="action-spacer"></div>
      <button class="action-btn">🔖</button>
    </div>
    <div class="like-count" id="likeCount_${id}"><strong>${likeCounts[id]}</strong> likes</div>
    <div class="post-caption">${cap}</div>
    <div class="comments-preview" id="comments_${id}">
      ${preComments.map(c => `
        <div class="comment-item">
          <img class="comment-avatar" src="${CONFIG.profilePhoto}" alt="" onerror="this.style.display='none'">
          <div class="comment-body">
            <span class="comment-author">${c.author}</span>
            <span class="comment-text">${c.text}</span>
            <div class="comment-time">${c.time}</div>
          </div>
        </div>`).join('')}
      <div class="comment-input-row">
        <input class="comment-input" id="commentInput_${id}" type="text" placeholder="add a comment...">
        <button class="comment-send" onclick="sendComment('${id}')">➤</button>
      </div>
    </div>`;

  // Multi-photo swipe
  if (imgs.length > 1) {
    let curImg = 0;
    let startX = 0;
    const photos = card.querySelector(`#photos_${id}`);
    photos.addEventListener('touchstart', e => startX = e.touches[0].clientX, {passive:true});
    photos.addEventListener('touchend', e => {
      const diff = startX - e.changedTouches[0].clientX;
      if (Math.abs(diff) > 40) {
        if (diff > 0 && curImg < imgs.length - 1) curImg++;
        else if (diff < 0 && curImg > 0) curImg--;
        card.querySelector(`#track_${id}`).style.transform = `translateX(-${curImg * 100}%)`;
        card.querySelectorAll('.photo-dot').forEach((d,i) => d.classList.toggle('active', i === curImg));
      }
    });
  }

  // Enter to send comment
  setTimeout(() => {
    const inp = document.getElementById('commentInput_' + id);
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') sendComment(id); });
  }, 100);

  return card;
}

function toggleLike(id) {
  const btn = document.getElementById('likeBtn_' + id);
  const num = document.getElementById('likeNum_' + id);
  const count = document.getElementById('likeCount_' + id);
  if (likedPosts.has(id)) {
    likedPosts.delete(id);
    likeCounts[id]--;
    btn.classList.remove('liked');
    btn.innerHTML = `🤍 <span id="likeNum_${id}">${likeCounts[id]}</span>`;
  } else {
    likedPosts.add(id);
    likeCounts[id]++;
    btn.classList.add('liked');
    btn.innerHTML = `❤️ <span id="likeNum_${id}">${likeCounts[id]}</span>`;
    showToast('❤️ liked!');
  }
  document.getElementById('likeCount_' + id).innerHTML = `<strong>${likeCounts[id]}</strong> likes`;
}

function doubleTapLike(id, el) {
  if (!likedPosts.has(id)) toggleLike(id);
  const hb = document.getElementById('hb_' + id);
  if (hb) {
    hb.style.animation = 'none';
    void hb.offsetWidth;
    hb.style.animation = 'heart-pop 0.8s ease forwards';
  }
}

function focusComment(id) {
  const inp = document.getElementById('commentInput_' + id);
  if (inp) inp.focus();
}

function sendComment(id) {
  const inp = document.getElementById('commentInput_' + id);
  if (!inp || !inp.value.trim()) return;
  const text = inp.value.trim();
  inp.value = '';
  const container = document.getElementById('comments_' + id);
  const inputRow = container.querySelector('.comment-input-row');
  const div = document.createElement('div');
  div.className = 'comment-item';
  div.innerHTML = `
    <img class="comment-avatar" src="${CONFIG.profilePhoto}" alt="" onerror="this.style.display='none'">
    <div class="comment-body">
      <span class="comment-author">${CONFIG.username}</span>
      <span class="comment-text">${text}</span>
      <div class="comment-time">now</div>
    </div>`;
  div.style.animation = 'slideUp 0.3s ease';
  container.insertBefore(div, inputRow);
  showToast('💬 comment added!');
}

// ── Profile ──────────────────────────────────────────────────
function initProfile() {
  document.getElementById('profileName').textContent = CONFIG.displayName;
  document.getElementById('profileHandle').textContent = CONFIG.username;
  document.getElementById('profileBio').textContent = CONFIG.bio;
  document.getElementById('profileJoined').textContent = '📅 ' + CONFIG.joined;
  document.getElementById('profileLocation').textContent = '📍 ' + CONFIG.location;
  if (CONFIG.verified) document.getElementById('verifiedBadge').style.display = '';

  // Avatar
  const av = document.getElementById('profileAvatar');
  av.innerHTML = `<img src="${CONFIG.profilePhoto}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.parentElement.innerHTML='🌸'">`;

  // Cover
  const cover = document.getElementById('profileCover');
  if (CONFIG.coverPhoto) {
    const img = document.createElement('img');
    img.className = 'profile-cover-img';
    img.src = CONFIG.coverPhoto;
    img.onerror = () => img.remove();
    cover.insertBefore(img, cover.firstChild);
  }

  // Stats
  document.getElementById('statPosts').textContent = CONFIG.posts.length + (CONFIG.pinnedPost ? 1 : 0);
  const totalLikes = CONFIG.posts.reduce((a,p) => a + (p.likes||0), 0);
  document.getElementById('statLikes').textContent = totalLikes > 999 ? (totalLikes/1000).toFixed(1) + 'k' : totalLikes;
  document.getElementById('statSongs').textContent = CONFIG.playlist.length;

  // Grid
  const grid = document.getElementById('profileGrid');
  const allImgs = [];
  if (CONFIG.pinnedPost?.image) allImgs.push({ src: CONFIG.pinnedPost.image, multi: false });
  CONFIG.posts.forEach(p => {
    if (p.images) allImgs.push({ src: p.images[0], multi: p.images.length > 1 });
    else if (p.image) allImgs.push({ src: p.image, multi: false });
  });
  allImgs.forEach(item => {
    const div = document.createElement('div');
    div.className = 'grid-item';
    div.innerHTML = `
      <img src="${item.src}" alt="" onerror="this.parentElement.innerHTML='<div class=grid-placeholder>🌸</div>'">
      ${item.multi ? '<div class="grid-multi-badge">⊞</div>' : ''}`;
    div.addEventListener('click', () => openImage(item.src));
    grid.appendChild(div);
  });
}

// ── Notifications ─────────────────────────────────────────────
function initNotifications() {
  const list = document.getElementById('notifList');
  const icons = { like: '❤️', comment: '💬', memory: '🎞', story: '✨', post: '📸', tag: '🎀', music: '🎵' };
  CONFIG.notifications.forEach(n => {
    const div = document.createElement('div');
    div.className = 'notif-item';
    div.innerHTML = `
      <div class="notif-avatar">
        <img src="${n.avatar}" alt="" style="width:100%;height:100%;border-radius:50%;object-fit:cover" onerror="this.parentElement.innerHTML='🌸'">
      </div>
      <div class="notif-content">
        <div class="notif-text">${n.text}</div>
        <div class="notif-time">${n.time}</div>
      </div>
      <div class="notif-icon">${icons[n.type] || '💜'}</div>`;
    list.appendChild(div);
  });
}

// ── Music Player ──────────────────────────────────────────────
let currentTrack = 0;
let isPlaying = false;
const audio = document.getElementById('audioPlayer');
let musicBarVisible = false;

function initPlaylist() {
  const container = document.getElementById('playlistContainer');
  CONFIG.playlist.forEach((track, i) => {
    const div = document.createElement('div');
    div.className = 'playlist-item' + (i === 0 ? ' active' : '');
    div.id = 'plitem_' + i;
    div.innerHTML = `
      <div class="pl-num">${i+1}</div>
      <div class="pl-cover">${track.cover ? `<img src="${track.cover}" alt="" style="width:100%;height:100%;border-radius:6px;object-fit:cover" onerror="this.parentElement.innerHTML='🎵'">` : '🎵'}</div>
      <div class="pl-info">
        <div class="pl-title">${track.title}</div>
        <div class="pl-artist">${track.artist}</div>
      </div>
      <div class="pl-dur" id="pldur_${i}">—</div>`;
    div.addEventListener('click', () => { loadTrack(i); startPlay(); });
    container.appendChild(div);
  });
  loadTrack(0);
}

function loadTrack(i) {
  currentTrack = i;
  const track = CONFIG.playlist[i];
  if (!track) return;
  audio.src = track.file;

  // Update all UI
  document.getElementById('miniMusicTitle').textContent = track.title;
  document.getElementById('miniMusicArtist').textContent = track.artist;
  document.getElementById('musicBigTitle').textContent = track.title;
  document.getElementById('musicBigArtist').textContent = track.artist;

  // Covers
  const coverHTML = track.cover ? `<img src="${track.cover}" alt="" style="width:100%;height:100%;border-radius:inherit;object-fit:cover" onerror="this.parentElement.innerHTML='🎵'">` : '🎵';
  document.getElementById('miniMusicCover').innerHTML = coverHTML;
  document.getElementById('musicBigCover').innerHTML = coverHTML;

  document.querySelectorAll('.playlist-item').forEach((el, idx) => el.classList.toggle('active', idx === i));
}

function togglePlay() {
  if (isPlaying) pausePlay();
  else startPlay();
}

function startPlay() {
  audio.play().catch(()=>{});
  isPlaying = true;
  updatePlayBtns();
  showMusicBar();
  document.getElementById('miniMusicCover').classList.add('playing');
  document.getElementById('musicBigCover').classList.add('playing');
}

function pausePlay() {
  audio.pause();
  isPlaying = false;
  updatePlayBtns();
  document.getElementById('miniMusicCover').classList.remove('playing');
  document.getElementById('musicBigCover').classList.remove('playing');
}

function updatePlayBtns() {
  const icon = isPlaying ? '⏸' : '▶';
  document.getElementById('miniPlayBtn').textContent = icon;
  document.getElementById('mainPlayBtn').textContent = icon;
}

function nextTrack() {
  loadTrack((currentTrack + 1) % CONFIG.playlist.length);
  if (isPlaying) startPlay();
}

function prevTrack() {
  loadTrack((currentTrack - 1 + CONFIG.playlist.length) % CONFIG.playlist.length);
  if (isPlaying) startPlay();
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('miniProgressBar').style.width = pct + '%';
  const seek = document.getElementById('musicSeek');
  if (seek && document.activeElement !== seek) seek.value = pct;
  document.getElementById('musicCurTime').textContent = fmt(audio.currentTime);
  document.getElementById('musicDurTime').textContent = fmt(audio.duration);
});

audio.addEventListener('ended', nextTrack);
audio.addEventListener('loadedmetadata', () => {
  const dur = document.getElementById('pldur_' + currentTrack);
  if (dur) dur.textContent = fmt(audio.duration);
});

document.getElementById('musicSeek').addEventListener('input', e => {
  if (audio.duration) audio.currentTime = (e.target.value / 100) * audio.duration;
});

function fmt(s) {
  const m = Math.floor(s/60), sec = Math.floor(s%60);
  return `${m}:${sec < 10 ? '0' : ''}${sec}`;
}

function showMusicBar() {
  if (currentPage === 'home') {
    document.getElementById('musicBar').classList.add('visible');
    musicBarVisible = true;
  }
}
function hideMusicBar() {
  document.getElementById('musicBar').classList.remove('visible');
  musicBarVisible = false;
}
function toggleMusic() {
  if (musicBarVisible) hideMusicBar();
  else { showMusicBar(); if (!isPlaying && CONFIG.playlist.length) startPlay(); }
}

// ── Modals ────────────────────────────────────────────────────
function openImage(src) {
  document.getElementById('imgViewerSrc').src = src;
  document.getElementById('imgModal').classList.add('open');
}
function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  if (id === 'storyModal') clearTimeout(storyTimer);
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

// ── Init All ──────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  applyTheme();
  initSplash();
  initNavbar();
  initStories();
  initQuotes();
  initFeed();
  initProfile();
  initNotifications();
  initPlaylist();

  // Keyboard close modals
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      closeModal('storyModal');
      closeModal('imgModal');
    }
  });
});
</script>
